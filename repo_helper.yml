# Configuration for 'repo_helper' (https://github.com/repo-helper/repo_helper)
---
modname: 'folium-zoom-state'
copyright_years: '2026'
author: 'Dominic Davis-Foster'
email: 'dominic@davis-foster.co.uk'
username: 'domdfcoding'
version: '0.1.0b1'
license: 'MIT'
short_desc: 'Folium plugin to preserve zoom level and map position when reloading
  or sharing URLs.'

enable_conda: false
enable_docs: false
on_pypi: false
use_whey: true

python_versions:
 - "3.9"
 - "3.10"
 - "3.11"
 - "3.12"
 - "3.13"

manifest_additional:
 - include folium_zoom_state/zoom_state.js

additional_ignore:
 - node_modules

exclude_files:
 - justfile
